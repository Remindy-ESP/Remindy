version: '3.8'

services:
  # Service Redis pour le cache et les queues
  redis:
    image: redis:7-alpine
    container_name: remindy-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - remindy-network

  # Redis Commander - Interface Web pour visualiser Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: remindy-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-dev_password}
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - remindy-network

  # PostgreSQL Database (optionnel pour dev local)
  postgres:
    image: postgres:16-alpine
    container_name: remindy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-remindy}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - remindy-network

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  remindy-network:
    driver: bridge

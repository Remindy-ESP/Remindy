name: Docker - Release (master)

on:
  push:
    branches: [master]

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_REPO: remindy/remindy-t-esp
  PLATFORMS: linux/amd64

jobs:
  semantic-release:
    name: Semantic release
    runs-on: ubuntu-latest

    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run semantic-release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          if [[ "${{ steps.release.outputs.new_release_published }}" == "true" ]]; then
            echo "Released version: ${{ steps.release.outputs.new_release_version }}"
            echo "Git tag: ${{ steps.release.outputs.new_release_git_tag }}"
          else
            echo "No release published — no relevant conventional commits since last tag."
          fi

  build-and-push:
    name: Build & push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: admin
            context: ./frontend_admin
            dockerfile: ./frontend_admin/Dockerfile

    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}

      - name: Compute short SHA
        id: meta-vars
        run: echo "short_sha=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute version parts
        id: version-parts
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          GIT_TAG="${{ needs.semantic-release.outputs.new_release_git_tag }}"
          MAJOR_MINOR=$(echo "$VERSION" | awk -F. '{print $1"."$2}')
          MAJOR=$(echo "$VERSION" | awk -F. '{print $1}')
          echo "full_tag=${{ matrix.service.name }}-${GIT_TAG}" >> "$GITHUB_OUTPUT"
          echo "minor_tag=${{ matrix.service.name }}-v${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "major_tag=${{ matrix.service.name }}-v${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ steps.version-parts.outputs.full_tag }}
            type=raw,value=${{ steps.version-parts.outputs.minor_tag }}
            type=raw,value=${{ steps.version-parts.outputs.major_tag }}
          labels: |
            org.opencontainers.image.title=remindy-${{ matrix.service.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}
            remindy.service=${{ matrix.service.name }}
            remindy.environment=prod

      - name: Build & push image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-release

      - name: Scan pushed image with Trivy (blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.version-parts.outputs.full_tag }}
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table

      - name: Summary
        run: |
          {
            echo "### remindy-${{ matrix.service.name }} — ${{ needs.semantic-release.outputs.new_release_git_tag }}"
            echo ""
            echo "- **Registry**: \`${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}\`"
            echo "- **Tags pushed**:"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
            echo "- **Digest**: \`${{ steps.docker-build.outputs.digest }}\`"
            echo "- **Platform**: \`${{ env.PLATFORMS }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

name: EAS Build Mobile

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend_mobile/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend_mobile/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build - ${{ github.event.inputs.platform || 'auto' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend_mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: |
          cd frontend_mobile
          npm ci

      - name: Run tests
        run: |
          cd frontend_mobile
          npm run test -- --passWithNoTests

      - name: Build on EAS (Auto)
        if: github.event_name == 'push' && github.event.inputs.platform == ''
        run: |
          cd frontend_mobile

          # Develop branch → Android Preview
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "Building Android Preview for develop branch..."
            eas build --platform android --profile preview --non-interactive --no-wait

          # Main branch → All platforms Production
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Building all platforms for production..."
            eas build --platform all --profile production --non-interactive --no-wait
          fi

      - name: Build on EAS (Manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd frontend_mobile
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --no-wait

      - name: Comment PR with build link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const buildUrl = 'https://expo.dev/accounts/remindy/projects/remindy/builds';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 EAS Build started!\n\nCheck progress: ${buildUrl}`
            });

  submit:
    name: Submit to Stores
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for builds to complete
        run: |
          echo "Waiting 20 minutes for builds to complete..."
          sleep 1200

      - name: Submit to Play Store (Internal)
        run: |
          cd frontend_mobile
          eas submit --platform android --latest --non-interactive || echo "Android submission failed"

      - name: Submit to App Store Connect
        run: |
          cd frontend_mobile
          eas submit --platform ios --latest --non-interactive || echo "iOS submission failed"

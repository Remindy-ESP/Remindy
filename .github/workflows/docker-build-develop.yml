name: Docker - Build & Push (develop)

on:
  push:
    branches: [develop]

concurrency:
  group: docker-develop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_REPO: remindy/remindy-t-esp
  PLATFORMS: linux/amd64
  ENV_PREFIX: dev

jobs:
  build-and-push:
    name: Build & push ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: admin
            context: ./frontend_admin
            dockerfile: ./frontend_admin/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute short SHA and build timestamp
        id: meta-vars
        run: |
          echo "short_sha=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ matrix.service.name }}-${{ env.ENV_PREFIX }}-${{ steps.meta-vars.outputs.short_sha }}
            type=raw,value=${{ matrix.service.name }}-${{ env.ENV_PREFIX }}-${{ steps.meta-vars.outputs.build_date }}-${{ steps.meta-vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=remindy-${{ matrix.service.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ matrix.service.name }}-${{ env.ENV_PREFIX }}-${{ steps.meta-vars.outputs.short_sha }}
            org.opencontainers.image.created=${{ steps.meta-vars.outputs.build_date }}
            remindy.service=${{ matrix.service.name }}
            remindy.environment=${{ env.ENV_PREFIX }}

      - name: Build & push image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}-${{ env.ENV_PREFIX }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-${{ env.ENV_PREFIX }}

      - name: Scan pushed image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ matrix.service.name }}-${{ env.ENV_PREFIX }}-${{ steps.meta-vars.outputs.short_sha }}
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: table

      - name: Summary
        run: |
          {
            echo "### remindy-${{ matrix.service.name }} (${{ env.ENV_PREFIX }})"
            echo ""
            echo "- **Registry**: \`${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}\`"
            echo "- **Tags pushed**:"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
            echo "- **Digest**: \`${{ steps.docker-build.outputs.digest }}\`"
            echo "- **Platform**: \`${{ env.PLATFORMS }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

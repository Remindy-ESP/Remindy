server_tokens off;

map $http_origin $cors_origin {
    default "";
}

server {
    listen       8080 default_server;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    absolute_redirect off;
    port_in_redirect off;

    client_max_body_size 1m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 4k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s 30s;

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "0" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'; upgrade-insecure-requests" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cache-Control "no-store" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|svg|png|jpe?g|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* \.(?:env|git|sql|bak|log|ini|yml|yaml|conf|sh|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    error_page 400 401 402 403 404 405 408 410 411 413 414 415 416 418 429 = @muted_error;
    error_page 500 502 503 504 = @muted_server_error;

    location @muted_error {
        internal;
        default_type text/plain;
        return 404 "";
    }

    location @muted_server_error {
        internal;
        default_type text/plain;
        return 500 "";
    }
}

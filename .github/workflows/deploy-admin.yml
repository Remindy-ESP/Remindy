name: Deploy Admin Frontend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend_admin/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend_admin/**'
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend_admin/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend_admin
          npm ci

      - name: Lint
        run: |
          cd frontend_admin
          npm run lint

      - name: Test (if tests exist)
        run: |
          cd frontend_admin
          npm test -- --passWithNoTests || echo "No tests found"

      - name: Build
        run: |
          cd frontend_admin
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.remindy.app' }}
          VITE_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

  deploy-vercel:
    name: Deploy to Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend_admin/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: |
          cd frontend_admin
          vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: |
          cd frontend_admin
          vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          cd frontend_admin
          DEPLOYMENT_URL=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Admin deployed!\n\n**Preview URL**: ${{ steps.deploy.outputs.url }}`
            });

  lighthouse:
    name: Lighthouse Performance Check
    needs: deploy-vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://admin.remindy.app
          uploadArtifacts: true
          temporaryPublicStorage: true

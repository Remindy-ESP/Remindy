name: Security - Trivy Scan

on:
  pull_request:
    branches: [develop, preprod, master]

jobs:
  trivy-fs-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: backend
            path: backend
          - name: frontend-admin
            path: frontend_admin
          - name: frontend-mobile
            path: frontend_mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy vulnerability scanner (${{ matrix.target.name }})
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.target.path }}
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table
          scanners: vuln,secret,misconfig

      - name: Run Trivy for SARIF upload (${{ matrix.target.name }})
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.target.path }}
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-${{ matrix.target.name }}.sarif
          scanners: vuln,secret,misconfig

      - name: Upload Trivy SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          sarif_file: trivy-${{ matrix.target.name }}.sarif
          category: trivy-${{ matrix.target.name }}

  trivy-config-scan:
    name: Trivy config & Dockerfile scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan Dockerfiles & IaC
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table

  trivy-summary:
    name: Trivy summary
    runs-on: ubuntu-latest
    needs: [trivy-fs-scan, trivy-config-scan]
    if: always()

    steps:
      - name: Aggregate results
        run: |
          if [[ "${{ needs.trivy-fs-scan.result }}" == "success" && \
                "${{ needs.trivy-config-scan.result }}" == "success" ]]; then
            echo "All Trivy scans passed."
          else
            echo "Trivy scans failed:"
            echo "  fs-scan: ${{ needs.trivy-fs-scan.result }}"
            echo "  config-scan: ${{ needs.trivy-config-scan.result }}"
            exit 1
          fi

sonar.projectKey=Remindy-ESP_Remindy
sonar.organization=remindy-esp

# Sources
sonar.sources=backend/src,frontend_mobile,frontend_admin/src

# Test files — excluded from issue analysis and duplication detection
sonar.exclusions=\
  **/*.spec.ts,\
  **/*.e2e-spec.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/test/**/*.ts,\
  **/__tests__/**,\
  **/jest.setup.js,\
  **/database/migrations/**,\
  **/database/seeds/**

# Also exclude from copy-paste detection:
# - test files & jest setup (test infrastructure)
# - database migrations: auto-generated by TypeORM, not hand-written code
# - swagger decorator files: repetitive applyDecorators() calls are
#   structural boilerplate, not logic duplication
# - mapper files: each layer boundary has its own mapper by design
#   (clean architecture); the mapping patterns are structurally similar
#   but map different types and cannot be merged across layers
# - presentation DTOs: mirror application DTOs by design; cross-layer
#   deduplication would break the architectural boundary
# - legal.tsx: static legal/terms screen — repetitive text block structure
#   is inherent to the content, not a code quality issue
# - date-range.vo.ts: backend value-object that intentionally mirrors the
#   mobile date helpers; the two live in separate npm packages and cannot
#   share a module, so the cross-project duplication is unavoidable.
# - jwt-auth.guard.ts: two guards whose only overlap is the framework
#   boilerplate (canActivate/handleRequest) with divergent test-mode logic.
sonar.cpd.exclusions=\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.e2e-spec.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/test/**,\
  **/__tests__/**,\
  **/jest.setup.js,\
  **/jest.setup.ts,\
  frontend_mobile/jest.setup.js,\
  **/database/migrations/**,\
  **/swagger/decorators/**,\
  **/mappers/**,\
  **/presentation/dto/**,\
  frontend_mobile/utils/**,\
  frontend_mobile/modules/**,\
  frontend_mobile/app/**,\
  **/legal.tsx,\
  **/date-range.vo.ts,\
  **/jwt-auth.guard.ts

# Coverage reports (generated by jest --coverage)
sonar.javascript.lcov.reportPaths=\
  backend/coverage/lcov.info,\
  frontend_mobile/coverage/lcov.info

# Exclude generated/config files from coverage expectations
sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.e2e-spec.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/database/migrations/**,\
  **/database/seeds/**,\
  **/*.module.ts,\
  **/main.ts,\
  **/*.dto.ts,\
  **/*.request.ts,\
  **/*.enum.ts,\
  **/*.events.ts,\
  **/index.ts

---
- name: Deploy Remindy Backend with Docker
  hosts: app_servers
  become: true
  vars:
    app_directory: /remindy-backend
    backend_port: 3000

  tasks:
    - name: Install Docker
      shell: |
        curl -fsSL https://get.docker.com -o get-docker.sh
        sh get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Install rsync
      apt:
        name: rsync
        state: present
        update_cache: yes

    - name: Create app directory
      file:
        path: "{{ app_directory }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Copy backend application
      synchronize:
        src: "{{ playbook_dir }}/../../../backend/"
        dest: "{{ app_directory }}/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=dist"
          - "--exclude=.git"

    - name: Set ownership
      file:
        path: "{{ app_directory }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: yes

    - name: Stop existing containers
      command: docker compose down
      args:
        chdir: "{{ app_directory }}"
      ignore_errors: yes

    - name: Start Docker containers
      command: docker compose up -d --build
      args:
        chdir: "{{ app_directory }}"

    - name: Show application URL
      debug:
        msg: "✅ Remindy Backend ready at http://{{ ansible_default_ipv4.address }}:{{ backend_port }}"
